<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no" />
  <title>A-Frame POI-App mit 2D-Karte</title>

  <!-- Nur A-Frame, kein AR.js -->
  <script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>

  <!-- OpenLayers für die alternative 2D-Karte -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/ol@10.9.0/ol.css" />
  <script src="https://cdn.jsdelivr.net/npm/ol@10.9.0/dist/ol.js"></script>

  <style>
    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #000;
    }

    #camera-video {
      position: fixed;
      inset: 0;
      width: 100vw;
      height: 100vh;
      object-fit: cover;
      z-index: 1;
      background: #000;
      display: block;
    }

    #ar-scene,
    #map-view {
      position: fixed;
      inset: 0;
    }

    #ar-scene {
      z-index: 2;
      background: transparent !important;
      pointer-events: none;
    }

    #ar-scene canvas,
    .a-canvas {
      background: transparent !important;
    }

    .a-enter-vr,
    .a-enter-ar {
      display: none !important;
    }

    .a-loader-title,
    .a-loader,
    .a-loading-screen,
    .a-loading-screen * {
      display: none !important;
      opacity: 0 !important;
      visibility: hidden !important;
      pointer-events: none !important;
    }

    #map-view {
      z-index: 10;
      display: none;
      background: #f3f4f6;
    }

    body.map-mode #map-view {
      display: block;
    }

    body.map-mode #ar-scene,
    body.map-mode #camera-video {
      visibility: hidden;
    }

    #map {
      width: 100%;
      height: 100%;
    }

    #view-switch {
      position: fixed;
      top: 12px;
      right: 12px;
      z-index: 30;
      display: flex;
      gap: 6px;
      padding: 6px;
      border-radius: 999px;
      background: rgba(0, 0, 0, 0.62);
      color: #fff;
      backdrop-filter: blur(8px);
    }

    #view-switch button {
      border: 0;
      border-radius: 999px;
      padding: 8px 12px;
      color: #fff;
      background: transparent;
      font-weight: 700;
      cursor: pointer;
      font: inherit;
      pointer-events: auto;
    }

    #view-switch button.active {
      background: #fff;
      color: #111827;
    }

    #ui {
      position: fixed;
      left: 12px;
      right: 12px;
      top: 62px;
      z-index: 20;
      padding: 12px 14px;
      border-radius: 14px;
      background: rgba(0, 0, 0, 0.62);
      color: #fff;
      backdrop-filter: blur(8px);
      font-size: 14px;
      line-height: 1.35;
    }

    body.map-mode #ui {
      right: auto;
      max-width: 360px;
      background: rgba(17, 24, 39, 0.86);
    }

    #status {
      font-weight: 700;
      margin-bottom: 4px;
    }

    .hint {
      opacity: 0.82;
    }

    #cameraStartButton {
      margin-top: 10px;
      padding: 8px 12px;
      border: 0;
      border-radius: 999px;
      background: #fff;
      color: #111827;
      font-weight: 700;
      cursor: pointer;
      font: inherit;
    }

    #poiList {
      margin-top: 8px;
      display: grid;
      gap: 4px;
      font-size: 13px;
      opacity: 0.95;
    }

    .poi-near {
      font-weight: 700;
    }

    #layer-control,
    #route-info {
      position: absolute;
      z-index: 10;
      padding: 14px;
      background: white;
      border-radius: 10px;
      box-shadow: 0 3px 12px rgba(0, 0, 0, 0.25);
      font-size: 14px;
      color: #111827;
    }

    #layer-control {
      top: 78px;
      right: 16px;
      width: 230px;
    }

    #layer-control h2 {
      margin: 0 0 10px;
      font-size: 16px;
    }

    #layer-control label {
      display: block;
      margin-bottom: 8px;
      cursor: pointer;
    }

    #layer-control input {
      margin-right: 6px;
    }

    #layer-control button,
    #route-info button {
      width: 100%;
      margin-top: 8px;
      padding: 8px 10px;
      border: none;
      border-radius: 6px;
      background: #1f2937;
      color: white;
      cursor: pointer;
      font: inherit;
    }

    #layer-control button:hover,
    #route-info button:hover {
      background: #374151;
    }

    #layer-control hr {
      border: none;
      border-top: 1px solid #e5e7eb;
      margin: 12px 0;
    }

    #route-info {
      left: 16px;
      bottom: 24px;
      width: 280px;
    }

    #route-info p {
      margin: 8px 0 10px;
      line-height: 1.4;
    }

    #route-info select {
      width: 100%;
      margin: 8px 0 10px;
      padding: 7px 8px;
      border: 1px solid #d1d5db;
      border-radius: 6px;
      background: white;
      font-size: 14px;
    }

    .ol-popup {
      position: absolute;
      min-width: 230px;
      padding: 14px;
      background: white;
      border-radius: 10px;
      bottom: 18px;
      left: 50%;
      transform: translateX(-50%);
      box-shadow: 0 3px 14px rgba(0, 0, 0, 0.3);
    }

    .ol-popup::after {
      content: "";
      position: absolute;
      top: 100%;
      left: 50%;
      margin-left: -10px;
      border-width: 10px;
      border-style: solid;
      border-color: white transparent transparent transparent;
    }

    .ol-popup-closer {
      position: absolute;
      top: 5px;
      right: 8px;
      border: none;
      background: transparent;
      font-size: 20px;
      cursor: pointer;
    }

    #popup-content h3 {
      margin: 0 20px 6px 0;
      font-size: 16px;
    }

    #popup-content p {
      margin: 0;
      font-size: 13px;
      line-height: 1.4;
    }

    @media (max-width: 700px) {
      #view-switch {
        left: 12px;
        right: auto;
      }

      #ui {
        top: 62px;
      }

      body.map-mode #ui {
        display: none;
      }

      #layer-control {
        top: 70px;
        right: 10px;
        width: calc(100% - 20px);
        max-height: 42vh;
        overflow: auto;
      }

      #route-info {
        left: 10px;
        right: 10px;
        bottom: 16px;
        width: auto;
      }
    }
  </style>
</head>

<body>
  <video id="camera-video" autoplay playsinline muted></video>

  <div id="view-switch" aria-label="Ansicht wechseln">
    <button id="arViewButton" class="active" type="button">A-Frame</button>
    <button id="mapViewButton" type="button">2D-Karte</button>
  </div>

  <div id="ui">
    <div id="status">Starte Kamera und Standort …</div>

    <div class="hint">
      Die POIs werden mit A-Frame über dem Kamerabild angezeigt.
      Alternativ kannst du oben zur 2D-Karte wechseln.
    </div>

    <button id="cameraStartButton" type="button">Kamera starten</button>

    <div id="poiList"></div>
  </div>

  <section id="map-view" aria-label="2D-Karte">
    <div id="map"></div>

    <div id="layer-control">
      <h2>2D-Karte</h2>

      <label>
        <input type="radio" name="base-layer" value="osm" checked />
        Straßenkarte
      </label>

      <label>
        <input type="radio" name="base-layer" value="satellite" />
        Satellitenbild
      </label>

      <label>
        <input type="radio" name="base-layer" value="topo" />
        Topografische Karte
      </label>

      <hr />

      <label>
        <input type="checkbox" id="poi-toggle" checked />
        POIs anzeigen
      </label>

      <label>
        <input type="checkbox" id="location-toggle" checked />
        Standort anzeigen
      </label>

      <label>
        <input type="checkbox" id="heading-toggle" checked />
        Blickrichtung anzeigen
      </label>

      <button id="locate-button" type="button">Meinen Standort suchen</button>
      <button id="heading-button" type="button">Blickrichtung aktivieren</button>
    </div>

    <div id="route-info">
      <strong>Route</strong>

      <label for="route-profile">Verkehrsmittel:</label>
      <select id="route-profile">
        <option value="car">Auto</option>
        <option value="bike">Fahrrad</option>
        <option value="foot">Fuß</option>
      </select>

      <p id="route-text">Wähle einen POI auf der Karte aus, um eine Route zu berechnen.</p>
      <button id="clear-route-button" type="button">Route löschen</button>
    </div>

    <div id="popup" class="ol-popup">
      <button id="popup-closer" class="ol-popup-closer" type="button">×</button>
      <div id="popup-content"></div>
    </div>
  </section>

  <a-scene
    id="ar-scene"
    embedded
    vr-mode-ui="enabled: false"
    loading-screen="enabled: false"
    renderer="alpha: true; antialias: true; colorManagement: true"
    background="transparent: true"
  >
    <a-entity id="cameraRig" rotation="0 0 0">
      <a-camera
        id="aframeCamera"
        position="0 1.6 0"
        near="0.1"
        far="20000"
      ></a-camera>
    </a-entity>
  </a-scene>

  <script src="./app.js?v=15"></script>
</body>
</html>
